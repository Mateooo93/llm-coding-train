# AttnRes LM — Target 9B Configuration
#
# The full revolutionary architecture. Requires multi-GPU training.
# Minimum: 8x 24GB GPUs with ZeRO-3 + gradient checkpointing + optimizer offloading.
#
# To train: use accelerate or DeepSpeed with this config.

model:
  vocab_size: 128256              # Llama 3-style large vocabulary
  hidden_size: 4096
  intermediate_size: 14336
  num_hidden_layers: 36
  num_attention_heads: 32
  num_key_value_heads: 8          # GQA: 4 query heads per KV group
  head_dim: 128
  rope_theta: 500000.0            # higher theta for long context
  max_position_embeddings: 8192

  # AttnRes configuration
  use_attn_res: true
  attn_res_block_size: 8          # 4 sublayers per block → 9 blocks total
  attn_res_init_scale: 0.01       # smaller init for stability at scale

  # Normalization
  rms_norm_eps: 1.0e-6

  # Embedding
  tie_word_embeddings: false

  # MoE (disabled — see target_9b_moe.yaml for MoE version)
  use_moe: false

  # Training
  gradient_checkpointing: true

training:
  learning_rate: 3.0e-4
  weight_decay: 0.1
  max_grad_norm: 1.0
  warmup_steps: 2000
  max_steps: 100000
  lr_scheduler_type: cosine

  batch_size: 2                   # per-device
  gradient_accumulation_steps: 16 # effective batch = 2 * 16 * num_gpus

  use_amp: true
  amp_dtype: bf16

  log_interval: 10
  eval_interval: 2000
  save_interval: 5000
  output_dir: ./checkpoints/target_9b

  use_wandb: true
  wandb_project: attnres-lm-9b

# Expected parameter count: ~9B
# Expected VRAM per GPU (8x24GB, ZeRO-3, bf16, grad ckpt): ~20-22GB
# Recommended tokens: 180B (Chinchilla optimal) to 1T+ (over-trained)
# Expected training time: weeks to months depending on token count
