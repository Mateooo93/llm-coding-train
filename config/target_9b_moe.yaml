# AttnRes LM — Target 9B MoE Configuration (30B total / 3B active)
#
# Matches the Kimi Linear approach: MoE + AttnRes.
# 8 experts, 2 active per token → 4x more parameters, same active compute.
#
# Requires multi-GPU training (8x 24GB+ minimum).

model:
  vocab_size: 128256
  hidden_size: 4096
  intermediate_size: 14336
  num_hidden_layers: 36
  num_attention_heads: 32
  num_key_value_heads: 8
  head_dim: 128
  rope_theta: 500000.0
  max_position_embeddings: 8192

  # AttnRes configuration
  use_attn_res: true
  attn_res_block_size: 8
  attn_res_init_scale: 0.01

  # Normalization
  rms_norm_eps: 1.0e-6

  # Embedding
  tie_word_embeddings: false

  # MoE configuration
  use_moe: true
  num_experts: 8
  num_experts_per_tok: 2
  moe_layer_interval: 2           # every other layer uses MoE

  # Attention type — hybrid (mix of full softmax + linear attention)
  # Like Kimi Linear: full attention for precise retrieval, linear for long context
  attention_type: hybrid
  hybrid_full_attention_interval: 6  # every 6th layer uses full softmax attention
  linear_attention_use_rope: true

  # Training
  gradient_checkpointing: true

training:
  learning_rate: 3.0e-4
  weight_decay: 0.1
  max_grad_norm: 1.0
  warmup_steps: 2000
  max_steps: 100000
  lr_scheduler_type: cosine

  batch_size: 2
  gradient_accumulation_steps: 16

  use_amp: true
  amp_dtype: bf16

  log_interval: 10
  eval_interval: 2000
  save_interval: 5000
  output_dir: ./checkpoints/target_9b_moe

  use_wandb: true
  wandb_project: attnres-lm-moe

  moe_aux_loss_weight: 0.01

# Expected total parameters: ~30B (8 experts * 14336 * 4096 * 3 * 18 MoE layers)
# Expected active parameters per token: ~3B
# Expected VRAM per GPU (8x24GB, ZeRO-3, expert parallelism): ~20-22GB
